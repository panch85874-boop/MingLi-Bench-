<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iPrintOS 掃碼看 FAQ 貼紙</title>
<style>
  :root{--brand:#1664d8;--ink:#1c2430;--sub:#5b6675;--line:#e6e9ee}
  *{box-sizing:border-box}
  html,body{margin:0;background:#e9edf3;font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--ink)}
  .toolbar{max-width:794px;margin:14px auto;display:flex;gap:10px;justify-content:flex-end;padding:0 8px}
  .toolbar button{background:var(--brand);color:#fff;border:0;border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer}
  /* A5-ish card centered on A4 */
  .sheet{width:794px;min-height:1123px;margin:0 auto 24px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;padding:48px}
  .card{width:520px;text-align:center;border:3px solid var(--brand);border-radius:24px;padding:46px 40px}
  .brand{font-size:20px;font-weight:700;color:var(--brand);letter-spacing:.5px}
  .h{font-size:42px;font-weight:800;line-height:1.2;margin:14px 0 4px}
  .h .em{color:var(--brand)}
  .sub{font-size:19px;color:var(--sub);margin:0 0 26px}
  .qr{width:300px;height:300px;margin:0 auto;padding:14px;border:1px solid var(--line);border-radius:16px}
  .qr img{width:100%;height:100%;display:block}
  .url{margin-top:18px;font-size:17px;color:var(--ink);word-break:break-all}
  .url b{color:var(--brand)}
  .foot{margin-top:14px;font-size:16px;color:var(--sub)}
  @media print{
    html,body{background:#fff}
    .toolbar{display:none}
    .sheet{box-shadow:none;margin:0;width:auto;min-height:auto}
    @page{size:A4;margin:12mm}
  }
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="window.print()">🖨️ 列印 / 存成 PDF</button>
</div>

<div class="sheet">
  <div class="card">
    <div class="brand">iPrintOS · 自助列印</div>
    <div class="h">掃我，看<span class="em">怎麼用</span></div>
    <div class="sub">Scan for the full how-to FAQ</div>
    <div class="qr"><img src="faq_qr.svg" alt="FAQ QR Code — https://iprinter.com.tw/faq.html"></div>
    <div class="url"><b>iprinter.com.tw/faq.html</b></div>
    <div class="foot">24 小時自助 · 列印 / 影印 / 掃描 / 付款<br>Open 24/7 · Print · Copy · Scan · Pay</div>
  </div>
</div>

</body>
</html>
